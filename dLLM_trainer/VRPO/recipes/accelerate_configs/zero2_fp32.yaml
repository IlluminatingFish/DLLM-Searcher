compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  offload_optimizer_device: cpu   # 将 optimizer 状态 offload 到 CPU，省显存（约 2–4GB/卡），训练会略慢
  offload_param_device: none
  zero3_init_flag: false
  overlap_comm: true
  zero_stage: 2
distributed_type: DEEPSPEED
downcast_bf16: 'auto'
machine_rank: 0
main_training_function: main
mixed_precision: 'no'   # FP32 - avoids bf16 NaN in SDAR block diffusion
num_machines: 1
num_processes: 8
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
